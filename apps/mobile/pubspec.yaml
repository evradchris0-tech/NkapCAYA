name: caya_mobile
description: Application mobile CAYA — Club des Amis de Yaoundé
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4
  go_router: ^13.2.0
  dio: ^5.4.1
  flutter_secure_storage: ^9.0.0
  fl_chart: ^0.67.0
  pdf: ^3.10.8
  printing: ^5.12.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
