name: CD — NkapCAYA

on:
  push:
    branches:
      - develop   # → déploiement staging automatique
      - main      # → déploiement production (avec approbation)

jobs:
  # ─────────────────────────────────────────────────
  # STAGING — déclenché sur develop
  # ─────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://api-staging.caya.cm

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build API
        run: pnpm --filter api build
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.STAGING_JWT_REFRESH_SECRET }}

      - name: Run Migrations (staging)
        run: pnpm exec prisma migrate deploy --schema=database/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      # ── Adapter selon votre hébergeur ─────────────
      # Exemple : Railway
      # - name: Deploy to Railway
      #   uses: bervproject/railway-deploy@v1.1.0
      #   with:
      #     railway-token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: caya-api-staging

      # Exemple : Render
      # - name: Deploy to Render
      #   run: |
      #     curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}

      # Exemple : VPS via SSH
      # - name: Deploy to VPS
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.STAGING_HOST }}
      #     username: ${{ secrets.STAGING_USER }}
      #     key: ${{ secrets.STAGING_SSH_KEY }}
      #     script: |
      #       cd /srv/caya
      #       git pull origin develop
      #       pnpm install --frozen-lockfile
      #       pnpm db:generate
      #       pnpm --filter api build
      #       pm2 restart caya-api

      - name: Notify deploy success
        if: success()
        run: echo "✅ Staging deployed — commit ${{ github.sha }}"

  # ─────────────────────────────────────────────────
  # PRODUCTION — déclenché sur main (avec approbation)
  # ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.caya.cm
    # L'environnement "production" doit être configuré sur GitHub
    # avec des "Required reviewers" pour forcer l'approbation manuelle

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build API
        run: pnpm --filter api build
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.PROD_JWT_REFRESH_SECRET }}

      - name: Run Migrations (production)
        run: pnpm exec prisma migrate deploy --schema=database/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      # ── Adapter selon votre hébergeur ─────────────
      # (mêmes options que staging, avec les secrets PROD)

      - name: Notify deploy success
        if: success()
        run: echo "🚀 Production deployed — commit ${{ github.sha }}"
