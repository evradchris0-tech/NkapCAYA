name: CD — NkapCAYA

on:
  # Déclenchement manuel depuis GitHub Actions → Run workflow
  # Passer en push automatique une fois les environments et secrets configurés :
  #   push:
  #     branches: [develop, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:
  # ─────────────────────────────────────────────────
  # STAGING — API
  # ─────────────────────────────────────────────────
  deploy-api-staging:
    name: API → Staging
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://api-staging.caya.cm

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build API
        run: pnpm --filter api build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.STAGING_JWT_REFRESH_SECRET }}

      - name: Run Migrations
        run: pnpm exec prisma migrate deploy --schema=database/schema.prisma
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      # ── Adapter selon votre hébergeur ──────────────────────────────────────
      # Exemple VPS via SSH :
      # - name: Deploy to VPS
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.STAGING_HOST }}
      #     username: ${{ secrets.STAGING_USER }}
      #     key: ${{ secrets.STAGING_SSH_KEY }}
      #     script: |
      #       cd /srv/caya && git pull && pnpm install --frozen-lockfile
      #       pnpm db:generate && pnpm --filter api build && pm2 restart caya-api

      - name: Notify
        run: echo "✅ API Staging deployed — ${{ github.sha }}"

  # ─────────────────────────────────────────────────
  # STAGING — Web (Vercel Preview)
  # ─────────────────────────────────────────────────
  deploy-web-staging:
    name: Web → Vercel Staging
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging'
    environment:
      name: staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (preview)
        working-directory: apps/web
        run: |
          vercel deploy \
            --build-env NEXT_PUBLIC_API_URL=https://api-staging.caya.cm/api/v1 \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────────────
  # PRODUCTION — API
  # ─────────────────────────────────────────────────
  deploy-api-production:
    name: API → Production
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://api.caya.cm

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build API
        run: pnpm --filter api build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.PROD_JWT_REFRESH_SECRET }}

      - name: Run Migrations
        run: pnpm exec prisma migrate deploy --schema=database/schema.prisma
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Notify
        run: echo "🚀 API Production deployed — ${{ github.sha }}"

  # ─────────────────────────────────────────────────
  # PRODUCTION — Web (Vercel Production)
  # ─────────────────────────────────────────────────
  deploy-web-production:
    name: Web → Vercel Production
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    needs: deploy-api-production
    environment:
      name: production
      url: https://caya.cm

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: apps/web
        run: |
          vercel deploy --prod \
            --build-env NEXT_PUBLIC_API_URL=https://api.caya.cm/api/v1 \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
