name: Deploy Web — Hostinger

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (production)
        run: pnpm build:web
        env:
          NEXT_PUBLIC_API_URL: https://api.nkapzen.com/api/v1
          NEXT_PUBLIC_APP_URL: https://caya.nkapzen.com

      - name: Prepare deployment package
        run: |
          mkdir -p _web_deploy

          cp -r apps/web/.next _web_deploy/.next
          cp -r apps/web/public _web_deploy/public
          cp apps/web/package.json _web_deploy/package.json
          cp apps/web/next.config.* _web_deploy/ 2>/dev/null || true

          # ecosystem PM2
          cat > _web_deploy/ecosystem.config.js << 'EOF'
          module.exports = {
            apps: [{
              name: 'caya-web',
              script: 'node_modules/.bin/next',
              args: 'start',
              env: {
                NODE_ENV: 'production',
                PORT: 3001,
              },
            }],
          };
          EOF

          tar -czf web-deploy.tar.gz -C _web_deploy .
          echo "Archive size: $(du -sh web-deploy.tar.gz | cut -f1)"

      - name: Upload archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: web-deploy.tar.gz
          target: /tmp/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            APP_DIR="$HOME/domains/caya.nkapzen.com/public_html"
            mkdir -p "$APP_DIR"

            # Extraire les nouveaux fichiers
            tar -xzf /tmp/web-deploy.tar.gz -C "$APP_DIR"

            # Installer les dépendances prod
            cd "$APP_DIR"
            npm install --omit=dev

            # Redémarrer le web
            pm2 restart caya-web 2>/dev/null || pm2 start ecosystem.config.js
            pm2 save

            echo "Web deploye avec succes"
            pm2 show caya-web | grep -E "status|uptime|restarts"
