name: Deploy — Hostinger (SSH/PM2 — DÉSACTIVÉ, remplacé par Hostinger natif)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Raison du déploiement manuel'
        required: false
        default: 'déploiement manuel forcé'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # ── Build API + Web ───────────────────────────────────────
      - name: Build API
        run: pnpm build:api

      - name: Build Web
        run: pnpm build:web
        env:
          NEXT_PUBLIC_API_URL: https://api.nkapzen.com/api/v1
          NEXT_PUBLIC_APP_URL: https://caya.nkapzen.com

      # ── Migrations via tunnel SSH ─────────────────────────────
      - name: Run migrations via SSH tunnel
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -f -N -L 3307:127.0.0.1:3306 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}

          export DATABASE_URL=$(echo "$DATABASE_URL" | sed 's/:3306/:3307/')

          echo "Migration en cours via tunnel SSH..."
          pnpm exec prisma migrate deploy --schema=database/schema.prisma
          echo "Migrations OK"

          kill $(lsof -t -i:3307) 2>/dev/null || true
          rm -f /tmp/deploy_key

      # ── Package API ───────────────────────────────────────────
      - name: Package API
        run: |
          mkdir -p _api_deploy/node_modules

          cp -r apps/api/dist _api_deploy/dist
          printf "'use strict';\nrequire('./dist/main');\n" > _api_deploy/index.js
          cp database/schema.prisma _api_deploy/schema.prisma

          # Prisma client pré-compilé
          PRISMA_DIR=$(find node_modules/.pnpm -path "*/.prisma" -type d 2>/dev/null | head -1)
          echo "Prisma client: $PRISMA_DIR"
          cp -r "$PRISMA_DIR" _api_deploy/node_modules/.prisma
          PRISMA_PARENT=$(dirname "$PRISMA_DIR")
          mkdir -p _api_deploy/node_modules/@prisma
          cp -r "$PRISMA_PARENT/@prisma/client" _api_deploy/node_modules/@prisma/client

          node -e "
            const pkg = require('./apps/api/package.json');
            const out = {
              name: 'caya-api',
              version: pkg.version || '1.0.0',
              private: true,
              main: 'index.js',
              engines: { node: '>=20.0.0' },
              scripts: { start: 'node index.js' },
              dependencies: pkg.dependencies
            };
            require('fs').writeFileSync('_api_deploy/package.json', JSON.stringify(out, null, 2));
          "

          tar -czf api-deploy.tar.gz -C _api_deploy .
          echo "Archive API: $(du -sh api-deploy.tar.gz | cut -f1)"

      # ── Package Web (standalone) ──────────────────────────────
      - name: Package Web
        run: |
          mkdir -p _web_deploy
          STANDALONE_ROOT="apps/web/.next/standalone"

          echo "=== standalone root ===" && ls "$STANDALONE_ROOT/"

          # Diagnostic : où est 'next' dans le standalone ?
          echo "=== FIND next dans standalone ==="
          find "$STANDALONE_ROOT" -path "*/next/package.json" -not -path "*/next/node_modules/*" 2>/dev/null | head -10
          echo "=== root node_modules ==="
          ls "$STANDALONE_ROOT/node_modules/" 2>/dev/null | head -20 || echo "pas de root node_modules"
          echo "=== apps/web node_modules ==="
          ls "$STANDALONE_ROOT/apps/web/node_modules/" 2>/dev/null | head -20 || echo "pas de apps/web node_modules"

          if [ -f "$STANDALONE_ROOT/apps/web/server.js" ]; then
            echo "Layout: monorepo — server.js dans apps/web/"
            cp -r "$STANDALONE_ROOT/apps/web/." _web_deploy/

            # Supprimer les symlinks pnpm cassés (pointent vers ../../node_modules/.pnpm/...)
            rm -rf _web_deploy/node_modules

            # pnpm standalone met les deps dans .pnpm/pkg@version/node_modules/
            # Il faut aplatir cette structure pour que Node.js les trouve
            mkdir -p _web_deploy/node_modules

            # 1) Copier depuis le store .pnpm : chaque package + ses deps
            for pnpm_nm in $(find "$STANDALONE_ROOT/node_modules/.pnpm" -mindepth 2 -maxdepth 2 -name "node_modules" -type d 2>/dev/null); do
              # Packages non-scopés
              for pkg in "$pnpm_nm"/[!@.]*/; do
                [ -d "$pkg" ] || continue
                name=$(basename "$pkg")
                [ ! -d "_web_deploy/node_modules/$name" ] && cp -r "$pkg" "_web_deploy/node_modules/$name"
              done
              # Packages scopés (@next/*, @swc/*, etc.)
              for scope in "$pnpm_nm"/@*/; do
                [ -d "$scope" ] || continue
                scope_name=$(basename "$scope")
                for pkg in "$scope"/*/; do
                  [ -d "$pkg" ] || continue
                  pkg_name=$(basename "$pkg")
                  mkdir -p "_web_deploy/node_modules/$scope_name"
                  [ ! -d "_web_deploy/node_modules/$scope_name/$pkg_name" ] && cp -r "$pkg" "_web_deploy/node_modules/$scope_name/$pkg_name"
                done
              done
            done

            # 2) Copier les packages réels (non-symlinks) de apps/web/node_modules
            if [ -d "$STANDALONE_ROOT/apps/web/node_modules" ]; then
              for item in "$STANDALONE_ROOT/apps/web/node_modules"/*/; do
                [ -L "${item%/}" ] && continue  # ignorer les symlinks
                [ -d "$item" ] || continue
                name=$(basename "$item")
                cp -r "$item" "_web_deploy/node_modules/$name" 2>/dev/null || true
              done
            fi

            echo "node_modules aplati depuis .pnpm store"
          elif [ -f "$STANDALONE_ROOT/server.js" ]; then
            echo "Layout: workspace — server.js à la racine"
            cp -r "$STANDALONE_ROOT/." _web_deploy/
          else
            echo "ERREUR: server.js introuvable dans standalone"
            find "$STANDALONE_ROOT" -name "server.js" 2>/dev/null | head -10
            exit 1
          fi

          # Vérifier
          echo "=== next module check ==="
          ls _web_deploy/node_modules/next/package.json 2>/dev/null && echo "next: OK" || echo "WARN: next manquant"
          echo "=== _web_deploy packages count ==="
          ls _web_deploy/node_modules/ 2>/dev/null | wc -l
          ls _web_deploy/node_modules/ 2>/dev/null | head -30

          # Fichiers statiques et public
          mkdir -p _web_deploy/.next/static
          cp -r apps/web/.next/static/. _web_deploy/.next/static/
          [ -d apps/web/public ] && cp -r apps/web/public _web_deploy/public || true

          cat > _web_deploy/ecosystem.config.js << 'EOFPM2'
          module.exports = {
            apps: [{
              name: 'caya-web',
              script: 'server.js',
              env: {
                NODE_ENV: 'production',
                PORT: 3001,
                HOSTNAME: '0.0.0.0',
              },
            }],
          };
          EOFPM2

          if [ ! -f "_web_deploy/server.js" ]; then
            echo "ERREUR: server.js absent de _web_deploy/"
            ls -la _web_deploy/
            exit 1
          fi

          tar -czf web-deploy.tar.gz -C _web_deploy .
          echo "Archive Web: $(du -sh web-deploy.tar.gz | cut -f1)"

      # ── Upload les 2 archives en UNE seule session SSH ────────
      - name: Upload archives
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          SSH_OPTS="-i /tmp/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          SSH_TARGET="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"

          # Combiner les 2 archives en un seul fichier pour un seul transfert
          cat api-deploy.tar.gz web-deploy.tar.gz > /tmp/combined-payload
          SPLIT_POINT=$(wc -c < api-deploy.tar.gz)
          echo "API: $(du -sh api-deploy.tar.gz | cut -f1), Web: $(du -sh web-deploy.tar.gz | cut -f1), Split: $SPLIT_POINT"

          for attempt in 1 2 3; do
            echo "Upload tentative $attempt..."
            if ssh $SSH_OPTS $SSH_TARGET "
              cat > /tmp/combined-payload
              head -c $SPLIT_POINT /tmp/combined-payload > /tmp/api-deploy.tar.gz
              tail -c +\$(($SPLIT_POINT + 1)) /tmp/combined-payload > /tmp/web-deploy.tar.gz
              rm /tmp/combined-payload
              echo 'Split OK: API=$(wc -c < /tmp/api-deploy.tar.gz) Web=$(wc -c < /tmp/web-deploy.tar.gz)'
            " < /tmp/combined-payload; then
              echo "Upload OK"
              break
            fi
            [ "$attempt" -eq 3 ] && echo "Upload echoue apres 3 tentatives" && exit 1
            sleep 15
          done
          rm -f /tmp/deploy_key /tmp/combined-payload

      # ── Deploy API + Web sur le serveur ───────────────────────
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # ── API ──
            echo "=== DEPLOYING API ==="
            API_DIR="$HOME/domains/nkapzen.com/public_html/api"
            mkdir -p "$API_DIR"

            cp "$API_DIR/.env" /tmp/caya-api.env 2>/dev/null || true
            rm -rf "$API_DIR"
            mkdir -p "$API_DIR"
            tar -xzf /tmp/api-deploy.tar.gz -C "$API_DIR"
            chmod -R 755 "$API_DIR/dist"
            [ -f /tmp/caya-api.env ] && cp /tmp/caya-api.env "$API_DIR/.env"

            cat > "$API_DIR/.htaccess" << 'HTEOF'
            RewriteEngine On
            RewriteRule ^(.*)$ http://localhost:3000/$1 [P,L]
            HTEOF

            cd "$API_DIR"
            npm install --omit=dev --legacy-peer-deps

            # Fix Prisma : le client généré en CI a des chemins hardcodés du runner
            # On injecte PRISMA_QUERY_ENGINE_LIBRARY pour pointer vers le bon binaire
            ENGINE_PATH=$(find "$API_DIR/node_modules/.prisma/client" -name "libquery_engine*" 2>/dev/null | head -1)
            if [ -n "$ENGINE_PATH" ]; then
              echo "Prisma engine: $ENGINE_PATH"
              grep -q "PRISMA_QUERY_ENGINE_LIBRARY" "$API_DIR/.env" 2>/dev/null || \
                echo "PRISMA_QUERY_ENGINE_LIBRARY=$ENGINE_PATH" >> "$API_DIR/.env"
            else
              echo "WARN: Prisma engine binary introuvable"
              find "$API_DIR/node_modules/.prisma" -type f -name "*.node" 2>/dev/null || true
            fi

            pm2 restart caya-api 2>/dev/null || pm2 start index.js --name caya-api
            echo "API deployee"
            pm2 show caya-api | grep -E "status|uptime|restarts"

            # ── WEB ──
            echo "=== DEPLOYING WEB ==="
            WEB_DIR="$HOME/domains/caya.nkapzen.com/public_html"

            rm -rf "$WEB_DIR"
            mkdir -p "$WEB_DIR"
            tar -xzf /tmp/web-deploy.tar.gz -C "$WEB_DIR"

            cat > "$WEB_DIR/.htaccess" << 'HTEOF'
            RewriteEngine On
            RewriteRule ^(.*)$ http://localhost:3001/$1 [P,L]
            HTEOF

            cd "$WEB_DIR"
            echo "=== server.js ===" && ls -la server.js
            echo "=== next module ===" && ls node_modules/next/package.json 2>/dev/null && echo "OK" || echo "MANQUANT"

            pm2 restart caya-web 2>/dev/null || pm2 start ecosystem.config.js

            pm2 save

            # Attendre que les apps démarrent
            sleep 3

            echo "=== PM2 STATUS ==="
            pm2 list

            # Diagnostic : les apps répondent-elles en local ?
            echo "=== CURL API ==="
            curl -s -o /dev/null -w "API localhost:3000 → HTTP %{http_code}" http://localhost:3000/api/v1/health || echo "API non joignable"
            echo ""
            echo "=== CURL WEB ==="
            curl -s -o /dev/null -w "Web localhost:3001 → HTTP %{http_code}" http://localhost:3001 || echo "Web non joignable"
            echo ""

            # Logs en cas d'erreur
            echo "=== PM2 LOGS API (last 15) ==="
            pm2 logs caya-api --nostream --lines 15 2>&1 || true
            echo "=== PM2 LOGS WEB (last 10) ==="
            pm2 logs caya-web --nostream --lines 10 2>&1 || true

            # Vérifier si mod_proxy est dispo
            echo "=== APACHE MODULES ==="
            apache2ctl -M 2>/dev/null | grep proxy || httpd -M 2>/dev/null | grep proxy || echo "mod_proxy: impossible a verifier"

            # Nettoyage
            rm -f /tmp/api-deploy.tar.gz /tmp/web-deploy.tar.gz /tmp/caya-api.env
