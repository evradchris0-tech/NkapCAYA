name: Deploy — Hostinger

on:
  push:
    branches: [master]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — API NestJS
  # ─────────────────────────────────────────────────────────────
  deploy-api:
    name: Build & Deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (Linux binary)
        run: pnpm db:generate

      - name: Build API
        run: pnpm build:api

      - name: Prepare deployment package
        run: |
          mkdir -p _api_deploy/node_modules

          cp -r apps/api/dist _api_deploy/dist
          printf "'use strict';\nrequire('./dist/main');\n" > _api_deploy/index.js
          cp database/schema.prisma _api_deploy/schema.prisma
          cp -r database/migrations _api_deploy/migrations

          # Prisma client pré-compilé (Linux CI = même binaire que le serveur)
          PRISMA_DIR=$(find node_modules/.pnpm -path "*/.prisma" -type d 2>/dev/null | head -1)
          echo "Prisma: $PRISMA_DIR"
          cp -r "$PRISMA_DIR" _api_deploy/node_modules/.prisma
          PRISMA_PARENT=$(dirname "$PRISMA_DIR")
          mkdir -p _api_deploy/node_modules/@prisma
          cp -r "$PRISMA_PARENT/@prisma/client" _api_deploy/node_modules/@prisma/client

          # Prisma CLI + migration engine (pour prisma migrate deploy sur le serveur)
          PRISMA_CLI_DIR=$(find node_modules/.pnpm -path "*/node_modules/prisma" -type d -not -path "*/@prisma/*" 2>/dev/null | head -1)
          echo "Prisma CLI: $PRISMA_CLI_DIR"
          cp -r "$PRISMA_CLI_DIR" _api_deploy/node_modules/prisma
          mkdir -p _api_deploy/node_modules/.bin
          ln -sf ../prisma/build/index.js _api_deploy/node_modules/.bin/prisma
          chmod +x _api_deploy/node_modules/.bin/prisma

          node -e "
            const pkg = require('./apps/api/package.json');
            const out = {
              name: 'caya-api',
              version: pkg.version || '1.0.0',
              private: true,
              main: 'index.js',
              engines: { node: '>=20.0.0' },
              scripts: {
                start: 'node index.js',
                migrate: './node_modules/.bin/prisma migrate deploy --schema=./schema.prisma'
              },
              dependencies: pkg.dependencies
            };
            require('fs').writeFileSync('_api_deploy/package.json', JSON.stringify(out, null, 2));
          "

          # Vérifier que le CLI est bien présent
          if [ ! -f "_api_deploy/node_modules/.bin/prisma" ]; then
            echo "ERREUR: prisma CLI absent du package de déploiement"
            ls -la _api_deploy/node_modules/.bin/ 2>/dev/null || echo "Dossier .bin absent"
            exit 1
          fi

          tar -czf api-deploy.tar.gz -C _api_deploy .
          echo "Archive API: $(du -sh api-deploy.tar.gz | cut -f1)"

      - name: Upload archive
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > /tmp/api-deploy.tar.gz" < api-deploy.tar.gz
          rm -f /tmp/deploy_key
          echo "Upload API OK"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            APP_DIR="$HOME/domains/nkapzen.com/public_html/api"
            mkdir -p "$APP_DIR"

            cp "$APP_DIR/.env" /tmp/caya-api.env 2>/dev/null || true
            tar -xzf /tmp/api-deploy.tar.gz -C "$APP_DIR"
            chmod -R 755 "$APP_DIR/dist"
            [ -f /tmp/caya-api.env ] && cp /tmp/caya-api.env "$APP_DIR/.env"

            cd "$APP_DIR"

            # Migrations AVANT npm install — le CLI prisma pré-compilé vient de l'archive CI
            # (npm install le supprimerait car prisma n'est pas dans dependencies)
            if [ -f ".env" ]; then
              set -a && source .env && set +a
              ./node_modules/.bin/prisma migrate deploy --schema=./schema.prisma
            else
              echo "ERREUR: .env absent dans $APP_DIR"
              exit 1
            fi

            npm install --omit=dev --legacy-peer-deps --ignore-scripts

            pm2 restart caya-api 2>/dev/null || pm2 start index.js --name caya-api
            pm2 save

            echo "API deployee"
            pm2 show caya-api | grep -E "status|uptime|restarts"

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Web Next.js  (attend que l'API soit terminée)
  # ─────────────────────────────────────────────────────────────
  deploy-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (production)
        run: pnpm build:web
        env:
          NEXT_PUBLIC_API_URL: https://api.nkapzen.com/api/v1
          NEXT_PUBLIC_APP_URL: https://caya.nkapzen.com

      - name: Prepare deployment package (standalone)
        run: |
          mkdir -p _web_deploy

          STANDALONE_ROOT="apps/web/.next/standalone"

          echo "=== standalone root ===" && ls "$STANDALONE_ROOT/"

          # Détecter le layout : monorepo (apps/web/server.js) ou workspace (server.js à la racine)
          if [ -f "$STANDALONE_ROOT/apps/web/server.js" ]; then
            echo "Layout: monorepo — server.js dans apps/web/"
            cp -r "$STANDALONE_ROOT/apps/web/." _web_deploy/
            [ -d "$STANDALONE_ROOT/node_modules" ] && cp -r "$STANDALONE_ROOT/node_modules" _web_deploy/node_modules || true
          elif [ -f "$STANDALONE_ROOT/server.js" ]; then
            echo "Layout: workspace — server.js à la racine"
            cp -r "$STANDALONE_ROOT/." _web_deploy/
          else
            echo "ERREUR: server.js introuvable dans standalone"
            find "$STANDALONE_ROOT" -name "server.js" 2>/dev/null | head -10
            exit 1
          fi

          # Fichiers statiques et public
          mkdir -p _web_deploy/.next/static
          cp -r apps/web/.next/static/. _web_deploy/.next/static/
          cp -r apps/web/public _web_deploy/public

          cat > _web_deploy/ecosystem.config.js << 'EOF'
          module.exports = {
            apps: [{
              name: 'caya-web',
              script: 'server.js',
              env: {
                NODE_ENV: 'production',
                PORT: 3001,
                HOSTNAME: '0.0.0.0',
              },
            }],
          };
          EOF

          # Vérifier que server.js est présent
          if [ ! -f "_web_deploy/server.js" ]; then
            echo "ERREUR: server.js absent de _web_deploy/"
            ls -la _web_deploy/
            exit 1
          fi

          tar -czf web-deploy.tar.gz -C _web_deploy .
          echo "Archive Web: $(du -sh web-deploy.tar.gz | cut -f1)"

      - name: Upload archive
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > /tmp/web-deploy.tar.gz" < web-deploy.tar.gz
          rm -f /tmp/deploy_key
          echo "Upload Web OK"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            APP_DIR="$HOME/domains/caya.nkapzen.com/public_html"
            mkdir -p "$APP_DIR"

            tar -xzf /tmp/web-deploy.tar.gz -C "$APP_DIR"

            cd "$APP_DIR"
            pm2 restart caya-web 2>/dev/null || pm2 start ecosystem.config.js
            pm2 save

            echo "Web deploye"
            pm2 show caya-web | grep -E "status|uptime|restarts"
