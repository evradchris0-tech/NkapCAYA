name: Deploy — Hostinger

on:
  push:
    branches: [master]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # ── Build API + Web ───────────────────────────────────────
      - name: Build API
        run: pnpm build:api

      - name: Build Web
        run: pnpm build:web
        env:
          NEXT_PUBLIC_API_URL: https://api.nkapzen.com/api/v1
          NEXT_PUBLIC_APP_URL: https://caya.nkapzen.com

      # ── Migrations via tunnel SSH ─────────────────────────────
      - name: Run migrations via SSH tunnel
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -f -N -L 3307:127.0.0.1:3306 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}

          export DATABASE_URL=$(echo "$DATABASE_URL" | sed 's/:3306/:3307/')

          echo "Migration en cours via tunnel SSH..."
          pnpm exec prisma migrate deploy --schema=database/schema.prisma
          echo "Migrations OK"

          kill $(lsof -t -i:3307) 2>/dev/null || true
          rm -f /tmp/deploy_key

      # ── Package API ───────────────────────────────────────────
      - name: Package API
        run: |
          mkdir -p _api_deploy/node_modules

          cp -r apps/api/dist _api_deploy/dist
          printf "'use strict';\nrequire('./dist/main');\n" > _api_deploy/index.js
          cp database/schema.prisma _api_deploy/schema.prisma

          # Prisma client pré-compilé
          PRISMA_DIR=$(find node_modules/.pnpm -path "*/.prisma" -type d 2>/dev/null | head -1)
          echo "Prisma client: $PRISMA_DIR"
          cp -r "$PRISMA_DIR" _api_deploy/node_modules/.prisma
          PRISMA_PARENT=$(dirname "$PRISMA_DIR")
          mkdir -p _api_deploy/node_modules/@prisma
          cp -r "$PRISMA_PARENT/@prisma/client" _api_deploy/node_modules/@prisma/client

          node -e "
            const pkg = require('./apps/api/package.json');
            const out = {
              name: 'caya-api',
              version: pkg.version || '1.0.0',
              private: true,
              main: 'index.js',
              engines: { node: '>=20.0.0' },
              scripts: { start: 'node index.js' },
              dependencies: pkg.dependencies
            };
            require('fs').writeFileSync('_api_deploy/package.json', JSON.stringify(out, null, 2));
          "

          tar -czf api-deploy.tar.gz -C _api_deploy .
          echo "Archive API: $(du -sh api-deploy.tar.gz | cut -f1)"

      # ── Package Web (standalone) ──────────────────────────────
      - name: Package Web
        run: |
          mkdir -p _web_deploy
          STANDALONE_ROOT="apps/web/.next/standalone"

          echo "=== standalone root ===" && ls "$STANDALONE_ROOT/"

          if [ -f "$STANDALONE_ROOT/apps/web/server.js" ]; then
            echo "Layout: monorepo — server.js dans apps/web/"
            cp -r "$STANDALONE_ROOT/apps/web/." _web_deploy/

            # Merger les node_modules racine (contient 'next' et les deps partagées)
            if [ -d "$STANDALONE_ROOT/node_modules" ]; then
              mkdir -p _web_deploy/node_modules
              cp -rn "$STANDALONE_ROOT/node_modules/." _web_deploy/node_modules/
              echo "Root node_modules merged"
            fi
          elif [ -f "$STANDALONE_ROOT/server.js" ]; then
            echo "Layout: workspace — server.js à la racine"
            cp -r "$STANDALONE_ROOT/." _web_deploy/
          else
            echo "ERREUR: server.js introuvable dans standalone"
            find "$STANDALONE_ROOT" -name "server.js" 2>/dev/null | head -10
            exit 1
          fi

          # Diagnostic
          echo "=== next module check ==="
          ls _web_deploy/node_modules/next/package.json 2>/dev/null && echo "next: OK" || echo "WARN: next manquant"
          echo "=== node_modules top-level ==="
          ls _web_deploy/node_modules/ | head -30

          # Fichiers statiques et public
          mkdir -p _web_deploy/.next/static
          cp -r apps/web/.next/static/. _web_deploy/.next/static/
          [ -d apps/web/public ] && cp -r apps/web/public _web_deploy/public || true

          cat > _web_deploy/ecosystem.config.js << 'EOFPM2'
          module.exports = {
            apps: [{
              name: 'caya-web',
              script: 'server.js',
              env: {
                NODE_ENV: 'production',
                PORT: 3001,
                HOSTNAME: '0.0.0.0',
              },
            }],
          };
          EOFPM2

          if [ ! -f "_web_deploy/server.js" ]; then
            echo "ERREUR: server.js absent de _web_deploy/"
            ls -la _web_deploy/
            exit 1
          fi

          tar -czf web-deploy.tar.gz -C _web_deploy .
          echo "Archive Web: $(du -sh web-deploy.tar.gz | cut -f1)"

      # ── Upload les 2 archives en UNE seule session SSH ────────
      - name: Upload archives
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          SSH_OPTS="-i /tmp/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          SSH_TARGET="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"

          # Combiner les 2 archives en un seul fichier pour un seul transfert
          cat api-deploy.tar.gz web-deploy.tar.gz > /tmp/combined-payload
          SPLIT_POINT=$(wc -c < api-deploy.tar.gz)
          echo "API: $(du -sh api-deploy.tar.gz | cut -f1), Web: $(du -sh web-deploy.tar.gz | cut -f1), Split: $SPLIT_POINT"

          for attempt in 1 2 3; do
            echo "Upload tentative $attempt..."
            if ssh $SSH_OPTS $SSH_TARGET "
              cat > /tmp/combined-payload
              head -c $SPLIT_POINT /tmp/combined-payload > /tmp/api-deploy.tar.gz
              tail -c +\$(($SPLIT_POINT + 1)) /tmp/combined-payload > /tmp/web-deploy.tar.gz
              rm /tmp/combined-payload
              echo 'Split OK: API=$(wc -c < /tmp/api-deploy.tar.gz) Web=$(wc -c < /tmp/web-deploy.tar.gz)'
            " < /tmp/combined-payload; then
              echo "Upload OK"
              break
            fi
            [ "$attempt" -eq 3 ] && echo "Upload echoue apres 3 tentatives" && exit 1
            sleep 15
          done
          rm -f /tmp/deploy_key /tmp/combined-payload

      # ── Deploy API + Web sur le serveur ───────────────────────
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # ── API ──
            echo "=== DEPLOYING API ==="
            API_DIR="$HOME/domains/nkapzen.com/public_html/api"
            mkdir -p "$API_DIR"

            cp "$API_DIR/.env" /tmp/caya-api.env 2>/dev/null || true
            rm -rf "$API_DIR"
            mkdir -p "$API_DIR"
            tar -xzf /tmp/api-deploy.tar.gz -C "$API_DIR"
            chmod -R 755 "$API_DIR/dist"
            [ -f /tmp/caya-api.env ] && cp /tmp/caya-api.env "$API_DIR/.env"

            cat > "$API_DIR/.htaccess" << 'HTEOF'
            RewriteEngine On
            RewriteRule ^(.*)$ http://localhost:3000/$1 [P,L]
            HTEOF

            cd "$API_DIR"
            npm install --omit=dev --legacy-peer-deps

            pm2 restart caya-api 2>/dev/null || pm2 start index.js --name caya-api
            echo "API deployee"
            pm2 show caya-api | grep -E "status|uptime|restarts"

            # ── WEB ──
            echo "=== DEPLOYING WEB ==="
            WEB_DIR="$HOME/domains/caya.nkapzen.com/public_html"

            rm -rf "$WEB_DIR"
            mkdir -p "$WEB_DIR"
            tar -xzf /tmp/web-deploy.tar.gz -C "$WEB_DIR"

            cat > "$WEB_DIR/.htaccess" << 'HTEOF'
            RewriteEngine On
            RewriteRule ^(.*)$ http://localhost:3001/$1 [P,L]
            HTEOF

            cd "$WEB_DIR"
            echo "=== server.js ===" && ls -la server.js
            echo "=== next module ===" && ls node_modules/next/package.json 2>/dev/null && echo "OK" || echo "MANQUANT"

            pm2 restart caya-web 2>/dev/null || pm2 start ecosystem.config.js

            pm2 save
            echo "=== PM2 STATUS ==="
            pm2 list

            # Nettoyage
            rm -f /tmp/api-deploy.tar.gz /tmp/web-deploy.tar.gz /tmp/caya-api.env
